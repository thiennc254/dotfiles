[opener]
edit = [
    { run = 'nvim "$@"', block = true },
]
play = [
    { run = 'mpv "$@"', orphan = true, for = "unix" },
]
display = [
    { run = 'imv "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
    { name = "*.mkv", use = "play" },
    { name = "*.mp4", use = "play" },
    { mime = "image/*", use = "display" },
]
