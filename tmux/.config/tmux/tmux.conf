#===============================
# Tmux Configuration File
#===============================

#===== Enable 256-color support and true color 
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

#===== General settings
set -g mouse on
set -g set-clipboard on
set -g status-interval 2
set -g escape-time 0
set -g status-keys vi
set -g mode-keys vi
set-option -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on
set -g focus-events on

#===== Shells in tmux
# set -g default-shell /usr/bin/fish
# set -g default-shell /usr/bin/zsh

#===== Set Prefix key
unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

#===== Refresh tmux config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

#===== Keybindings

#= Vi
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection

#= Selection
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

#= Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

#- Windows
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5

#= Split Windows
unbind %
unbind '"'
bind c new-window -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"

#= Popup toggle
bind f if-shell -F '#{==:#{session_name},popup}' \
    { detach-client } \
    { display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "tmux attach-session -t popup || tmux new-session -s popup" }

#===== Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

#===== Plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

#===== Automatic restore
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'

#===== Status-line position
set-option -g status-position top

#===== Themes
source-file ~/.config/tmux/tmux-theme.conf

#===== Run tpm
run '~/.config/tmux/plugins/tpm/tpm'
