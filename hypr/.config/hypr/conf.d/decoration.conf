# =============================================================================
# DECORATION
# =============================================================================

decoration {
    rounding = 8
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.1696
        new_optimizations = true
        xray = true
        ignore_opacity = true
    }
}
