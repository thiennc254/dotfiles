# =============================================================================
# ANIMATIONS - SMOOTH & ORGANIC STYLE
# =============================================================================

animations {
    enabled = yes

    # --- Custom Bezier Curves for Smoothness ---
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = organic, 0.23, 1, 0.32, 1
    bezier = md3_standard, 0.2, 0, 0, 1

    # --- Animation Rules ---
    animation = windows, 1, 5, organic, popin 80%
    animation = windowsOut, 1, 5, organic, popin 80%
    animation = fade, 1, 4, default
    animation = workspaces, 1, 5, organic, slidefade 50%
    animation = specialWorkspace, 1, 5, organic, slidevert 50%
    animation = layers, 1, 4, md3_standard, fade
}
